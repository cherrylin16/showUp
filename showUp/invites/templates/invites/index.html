<!DOCTYPE html>
<html lang="en">
    <head>
        <style>
            .tools {
                display: flex;
                justify-content: space-between;
                padding: 10px;
                padding-top: 20px;
                padding-bottom: 0px;
            }

            .tools-content {
                font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
                background-color: white;
                border-radius: 3px;
                font-size: 15px;
                height: 40px;
            }

            #InvitesSearchTextBox {
                font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
                border-radius: 3px;
            }

            .invites-body {
                display: inline-flex;
                gap: 10px;
                padding: 10px;
                padding-top: 0px;
            }

            .invites-card {
                border: 1px solid black;
                padding: 10px;
                padding-top: 0px;
            }

            button {
                background-color: white;
                border-radius: 5px;
                font-size: 15px;
                align-items: center;
                cursor: pointer;
            }

            .rsvp-button {
                display: flex;
                justify-content: center;
            }
        </style>        
    </head>
    <body>    
        {% include "static/navigationbar.html" %}
        <div class="tools">
            <input id="InvitesSearchTextBox" type="text" class="col-10" placeholder="Search" />
            <select class="tools-content">
                <option value="All">All Invites</option>
                <option value="Yes">Yes</option>
                <option value="Maybe">Maybe</option>
                <option value="No">No</option>
                <option value="No RSVP">Not Response Yet</option>
            </select>
            <button type="button" class="tools-content">Create Event</button>
        </div>
        <h1 style="padding-left: 10px;">Invites</h1>
        <div class="invites-body col-12">    
            {% for invite in user_invites %}
                <div class="invites-card col-3">
                    <h2>Event Name</h2>
                    <p>Host: </p>
                    <p>Date: </p>
                    <p>Time: </p>
                    <p>Theme: </p>
                    <p>Going? </p>
                    <!-- conditional to show button if not rsvp'd otherwise, show the status -->
                    <form method="" action="{% url 'invites:rsvp_form' %}" class="rsvp-button">
                        {% csrf_token %}
                        <button type="submit" name="event_id">RSVP</button>
                    </form>
                    <!-- <form method="" action="{% url 'invites:rsvp_form' %}" class="rsvp-button">
                        {% csrf_token %}
                        <button type="submit" name="event_id">Update RSVP</button>
                    </form> -->
                {% endfor %}
            </div>
        </div>
    </body>
</html>
