{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{% static 'dashboard_home.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

{% include "static/navigationbar.html" %}

<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg p-4" style="width: 420px; border-radius: 12px;">

        <h2 class="text-center mb-2">Welcome Back</h2>
        <p class="text-center text-muted mb-4">Log in to continue to ShowUp</p>

        {% if form.errors %}
            <div class="alert alert-danger">
                Invalid email/username or password.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Email / Username</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-2">
                Log In
            </button>
        </form>

        <div class="text-center mt-3">
            <span>Need an account?</span>
            <a href="{% url 'signup' %}">Sign up</a>
        </div>

    </div>
</div>

</body>
</html>
